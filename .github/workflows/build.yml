name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew test

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK file
      run: mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/Apple Podcasts.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: apple-podcasts-app
        path: "app/build/outputs/apk/debug/Apple Podcasts.apk"

  release:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
    - name: Download tested APK artifact
      uses: actions/download-artifact@v4
      with:
        name: apple-podcasts-app
        path: release-out

    - name: Create or Update Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "release-out/Apple Podcasts.apk"
        tag: "latest"
        name: "Apple Podcasts Android App (Latest)"
        body: "Automated rolling release containing the latest compiled APK. Click `Apple Podcasts.apk` below to download and install."
        generateReleaseNotes: true
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
