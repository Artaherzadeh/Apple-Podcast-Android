name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Version Name
      id: get_version
      run: |
        VERSION=$(grep "versionName =" app/build.gradle.kts | head -n 1 | awk -F'"' '{print $2}')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew test

    - name: Ensure Keystore Exists
      run: |
        if [ ! -f app/debug.keystore ]; then
          echo "WARNING: Consistent keystore app/debug.keystore is missing! Generating a temporary local fallback."
          keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
        else
          echo "Consistent keystore found."
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK file
      run: mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/Apple.Podcasts.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: apple-podcasts-app
        path: "app/build/outputs/apk/debug/Apple.Podcasts.apk"

  release:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
    - name: Download tested APK artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: apple-podcasts-app
        path: release-out

    - name: Create or Update Release
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
      with:
        artifacts: "release-out/Apple.Podcasts.apk"
        tag: "v${{ needs.build-and-test.outputs.version }}"
        name: "Apple Podcasts v${{ needs.build-and-test.outputs.version }}"
        body: "Automated release of Apple Podcasts for Android v${{ needs.build-and-test.outputs.version }}. Download Apple.Podcasts.apk below to install. Signed with reproducible keystore."
        generateReleaseNotes: false
        allowUpdates: true
        removeArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
