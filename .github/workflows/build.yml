name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK file
      run: mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/Apple Podcasts.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: apple-podcasts-app
        path: "app/build/outputs/apk/debug/Apple Podcasts.apk"

    - name: Create or Update Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: ncipollo/release-action@v1
      with:
        artifacts: "app/build/outputs/apk/debug/Apple Podcasts.apk"
        tag: "latest"
        name: "Apple Podcasts Android App (Latest)"
        body: "Automated rolling release containing the latest compiled APK. Click `Apple Podcasts.apk` below to download and install."
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
