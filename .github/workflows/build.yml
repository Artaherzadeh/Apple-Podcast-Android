name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@dbf70ceee575b634812a4ee566d8f682662c64e5 # v4.0.0

    - name: Set up JDK 17
      uses: actions/setup-java@8a4726e2045a012aa25e0d6628b6c16382098c6c # v4.4.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew test

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK file
      run: mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/Apple Podcasts.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
      with:
        name: apple-podcasts-app
        path: "app/build/outputs/apk/debug/Apple Podcasts.apk"

  release:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
    - name: Download tested APK artifact
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372ec868390 # v4.1.8
      with:
        name: apple-podcasts-app
        path: release-out

    - name: Create or Update Release
      uses: ncipollo/release-action@2c27b408d111bd48d0cf402377d6d5ef0f3cfd42 # v1.14.0
      with:
        artifacts: "release-out/Apple Podcasts.apk"
        tag: "latest"
        name: "Apple Podcasts Android App (Latest)"
        body: "Automated rolling release containing the latest compiled APK. Click `Apple Podcasts.apk` below to download and install."
        generateReleaseNotes: true
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
